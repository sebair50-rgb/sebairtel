# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # The amount of CPU to allocate to a container instance.
  # The value is in CPU-units, where 1 CPU-unit corresponds to 1 vCPU.
  cpu: 1
  # The amount of memory in MiB to allocate to a container instance.
  memoryMiB: 1024
  # The number of concurrent requests a container instance can service.
  concurrency: 100
  # The minimum number of container instances to keep running.
  minInstances: 1
  # The maximum number of container instances to scale up to.
  maxInstances: 10
